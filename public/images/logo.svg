<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB800"/>
      <stop offset="100%" style="stop-color:#FFC933"/>
    </linearGradient>
  </defs>

  <!-- Accent bar left -->
  <rect x="0" y="14" width="4" height="32" fill="url(#accentGradient)" rx="2"/>

  <!-- TAXI text -->
  <text x="14" y="38"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="700"
        letter-spacing="2"
        fill="#FFFFFF">
    TAXI
  </text>

  <!-- 02 text in accent -->
  <text x="100" y="38"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="700"
        letter-spacing="2"
        fill="#FFB800">
    02
  </text>

  <!-- STRASBOURG sub-text -->
  <text x="14" y="52"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        font-weight="400"
        letter-spacing="3"
        fill="#6B7A99">
    STRASBOURG
  </text>

  <!-- Accent underline -->
  <rect x="14" y="56" width="180" height="2" fill="url(#accentGradient)" rx="1"/>
</svg>
