<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" width="240" height="70">
  <defs>
    <!-- Dégradé bordeaux -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B4A5E"/>
      <stop offset="25%" style="stop-color:#E8AEBE"/>
      <stop offset="50%" style="stop-color:#7A3345"/>
      <stop offset="75%" style="stop-color:#6B2D3C"/>
      <stop offset="100%" style="stop-color:#5C1A2A"/>
    </linearGradient>

    <!-- Effet de brillance -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7A3345"/>
      <stop offset="50%" style="stop-color:#9B4A5E"/>
      <stop offset="100%" style="stop-color:#7A3345"/>
    </linearGradient>

    <!-- Ombre portée subtile -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7A3345" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sb'Est text avec dégradé bordeaux -->
  <text x="12" y="48"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="700"
        letter-spacing="1"
        fill="url(#goldGradient)"
        filter="url(#shadow)">
    Sb'Est
  </text>

  <!-- Taxi text en foreground -->
  <text x="148" y="48"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="400"
        letter-spacing="1"
        fill="#2D1F24">
    Taxi
  </text>

  <!-- Ligne de soulignement bordeaux -->
  <rect x="12" y="56" width="216" height="3" fill="url(#goldGradient)" rx="1.5"/>

  <!-- Accent bordeaux à gauche -->
  <rect x="0" y="20" width="4" height="30" fill="url(#shineGradient)" rx="2"/>
</svg>
