<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#060D1A"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB800"/>
      <stop offset="100%" style="stop-color:#FFC933"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(255,184,0,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>

  <!-- Corner decorations -->
  <rect x="40" y="40" width="4" height="80" fill="url(#accentGrad)" rx="2"/>
  <rect x="40" y="40" width="80" height="4" fill="url(#accentGrad)" rx="2"/>
  <rect x="1156" y="40" width="4" height="80" fill="url(#accentGrad)" rx="2"/>
  <rect x="1080" y="40" width="80" height="4" fill="url(#accentGrad)" rx="2"/>
  <rect x="40" y="510" width="4" height="80" fill="url(#accentGrad)" rx="2"/>
  <rect x="40" y="586" width="80" height="4" fill="url(#accentGrad)" rx="2"/>
  <rect x="1156" y="510" width="4" height="80" fill="url(#accentGrad)" rx="2"/>
  <rect x="1080" y="586" width="80" height="4" fill="url(#accentGrad)" rx="2"/>

  <!-- TAXI text -->
  <text x="600" y="270"
        font-family="Arial, Helvetica, sans-serif"
        font-size="160"
        font-weight="700"
        letter-spacing="20"
        fill="#FFFFFF"
        text-anchor="middle">
    TAXI
  </text>

  <!-- 02 accent text -->
  <text x="600" y="390"
        font-family="Arial, Helvetica, sans-serif"
        font-size="130"
        font-weight="700"
        letter-spacing="16"
        fill="url(#accentGrad)"
        text-anchor="middle"
        filter="url(#glow)">
    02
  </text>

  <!-- Separator line -->
  <rect x="300" y="415" width="600" height="3" fill="url(#accentGrad)" rx="1.5"/>

  <!-- STRASBOURG -->
  <text x="600" y="460"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="400"
        letter-spacing="10"
        fill="#6B7A99"
        text-anchor="middle">
    STRASBOURG
  </text>

  <!-- Badges -->
  <g transform="translate(600, 520)">
    <rect x="-250" y="-16" width="160" height="32" fill="rgba(255,184,0,0.12)" stroke="#FFB800" stroke-width="1" rx="16"/>
    <text x="-170" y="5" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#FFB800" text-anchor="middle">CONVENTIONNÉ CPAM</text>

    <rect x="-70" y="-16" width="140" height="32" fill="rgba(255,184,0,0.12)" stroke="#FFB800" stroke-width="1" rx="16"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#FFB800" text-anchor="middle">DISPONIBLE 24H/24</text>

    <rect x="90" y="-16" width="160" height="32" fill="rgba(255,184,0,0.12)" stroke="#FFB800" stroke-width="1" rx="16"/>
    <text x="170" y="5" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#FFB800" text-anchor="middle">AÉROPORT • GARE • CPAM</text>
  </g>

  <!-- Phone number -->
  <text x="600" y="590"
        font-family="Arial, Helvetica, sans-serif"
        font-size="38"
        font-weight="700"
        fill="url(#accentGrad)"
        text-anchor="middle"
        filter="url(#glow)">
    07 53 14 53 71
  </text>
</svg>
